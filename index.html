<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Your Table</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    input {
      padding: 12px;
      width: 80%;
      font-size: 16px;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #map {
      margin-top: 20px;
      width: 100%;
      max-width: 400px;
    }

    .table {
      fill: #ccc;
      stroke: #333;
    }

    .highlight {
      fill: gold;
    }

    .path {
      stroke: red;
      stroke-width: 4;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw 2s forwards;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
</head>

<body>

<h1>Find Your Table</h1>

<input id="nameInput" placeholder="Enter your name">
<br>
<button onclick="findTable()">Show Me</button>

<svg id="map" viewBox="0 0 300 400">

  <!-- Entrance -->
  <circle cx="150" cy="350" r="8" fill="blue" />

  <!-- Tables (3x3 grid) -->
  <rect id="t1" class="table" x="50" y="50" width="50" height="50"/>
  <rect id="t2" class="table" x="125" y="50" width="50" height="50"/>
  <rect id="t3" class="table" x="200" y="50" width="50" height="50"/>

  <rect id="t4" class="table" x="50" y="150" width="50" height="50"/>
  <rect id="t5" class="table" x="125" y="150" width="50" height="50"/>
  <rect id="t6" class="table" x="200" y="150" width="50" height="50"/>

  <rect id="t7" class="table" x="50" y="250" width="50" height="50"/>
  <rect id="t8" class="table" x="125" y="250" width="50" height="50"/>
  <rect id="t9" class="table" x="200" y="250" width="50" height="50"/>

</svg>

<script>
const guests = {
  "jazim": 5,
  "ali": 2,
  "sara": 8
};

function findTable() {
  let name = document.getElementById("nameInput").value.toLowerCase();

  document.querySelectorAll(".table").forEach(t => {
    t.classList.remove("highlight");
  });

  document.querySelectorAll(".path").forEach(p => p.remove());

  if (guests[name]) {
    let tableId = "t" + guests[name];
    document.getElementById(tableId).classList.add("highlight");

    drawPath(guests[name]);
  } else {
    alert("Name not found");
  }
}

function drawPath(table) {
  const paths = {
    1: "M150 350 L75 75",
    2: "M150 350 L150 75",
    3: "M150 350 L225 75",
    4: "M150 350 L75 175",
    5: "M150 350 L150 175",
    6: "M150 350 L225 175",
    7: "M150 350 L75 275",
    8: "M150 350 L150 275",
    9: "M150 350 L225 275"
  };

  let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", paths[table]);
  path.setAttribute("class", "path");

  document.getElementById("map").appendChild(path);
}
</script>

</body>
</html>
